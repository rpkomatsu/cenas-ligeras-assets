<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <style>
    .ring { fill: none; stroke: #C8D2BA; stroke-width: 5; }
    .arc  { fill: none; stroke: #455A3C; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 60 160; animation: spin 1.1s linear infinite; transform-origin: 40px 40px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <circle class="ring" cx="40" cy="40" r="30"/>
  <circle class="arc" cx="40" cy="40" r="30"/>
</svg>
