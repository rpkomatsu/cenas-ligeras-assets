<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <style>
    .steam { fill: none; stroke: #8FA081; stroke-width: 2.5; stroke-linecap: round; opacity: 0; }
    .s1 { animation: rise 2s ease-in-out 0s infinite; }
    .s2 { animation: rise 2s ease-in-out 0.5s infinite; }
    .s3 { animation: rise 2s ease-in-out 1s infinite; }
    .bowl { fill: #FAF6EE; stroke: #C8D2BA; stroke-width: 2; }
    .soup { fill: #D4974B; opacity: 0.7; }
    @keyframes rise {
      0%   { opacity: 0; transform: translateY(0) scaleX(1); }
      30%  { opacity: 0.7; }
      60%  { opacity: 0.5; transform: translateY(-22px) scaleX(1.3); }
      100% { opacity: 0; transform: translateY(-40px) scaleX(0.8); }
    }
  </style>
  <!-- Bowl -->
  <ellipse class="bowl" cx="60" cy="110" rx="46" ry="16"/>
  <path class="bowl" d="M14 110 Q14 148 60 150 Q106 148 106 110 Z"/>
  <!-- Soup surface -->
  <ellipse class="soup" cx="60" cy="110" rx="42" ry="13"/>
  <!-- Steam wisps -->
  <path class="steam s1" d="M45 104 Q40 90 45 76 Q50 62 45 48"/>
  <path class="steam s2" d="M60 102 Q55 88 60 74 Q65 60 60 46"/>
  <path class="steam s3" d="M75 104 Q80 90 75 76 Q70 62 75 48"/>
</svg>
