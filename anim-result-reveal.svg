<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <style>
    .bar-bg { fill: #C8D2BA; rx: 6; }
    .bar-fill { fill: #455A3C; animation: growBar 1s ease 0.3s both; transform-origin: left; transform: scaleX(0); }
    .label { font-family: Manrope, sans-serif; font-size: 13px; fill: #1A1F1A; font-weight: 600; }
    .pct   { font-family: Manrope, sans-serif; font-size: 12px; fill: #6F7464; }
    .dot { fill: #C75D3E; animation: popIn 0.4s ease both; transform-origin: center; transform: scale(0); }
    @keyframes growBar { to { transform: scaleX(1); } }
    @keyframes popIn   { to { transform: scale(1); } }
  </style>
  <!-- Row 1 -->
  <text class="label" x="0" y="18">Tu perfil identificado</text>
  <rect class="bar-bg" x="0" y="26" width="280" height="10" rx="5"/>
  <rect class="bar-fill" x="0" y="26" width="238" height="10" rx="5" style="animation-delay:0.3s"/>
  <text class="pct" x="288" y="36">85%</text>
  <!-- Row 2 -->
  <text class="label" x="0" y="68">Coincidencia con tu situación</text>
  <rect class="bar-bg" x="0" y="76" width="280" height="10" rx="5"/>
  <rect class="bar-fill" x="0" y="76" width="260" height="10" rx="5" style="animation-delay:0.6s"/>
  <text class="pct" x="288" y="86">93%</text>
  <!-- Dot indicator -->
  <circle class="dot" cx="18" cy="110" r="6" style="animation-delay:1s"/>
  <text font-family="Manrope,sans-serif" font-size="11" fill="#6F7464" x="30" y="115">Resultado listo</text>
</svg>
